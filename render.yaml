# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ga4-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ga4-kpi-db
          property: connectionString
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: COHORT_RETENTION_CSV
        value: data/cohort_retention.csv
      - key: GA4_OVERVIEW_CSV
        value: data/ga4_overview.csv
      - key: USER_ACQUISITION_CSV
        value: data/user_acquisition.csv
      - key: APP_DOWNLOADS_CSV
        value: data/app_downloads.csv

databases:
  - name: ga4-kpi-db
    plan: free
    databaseName: ga4_kpi
    user: ga4_kpi
